<div class="page-header">
  <div>
    <h2>{{ editando ? 'Editar refugio' : 'Nuevo refugio' }}</h2>
    <p class="page-header__sub">
      {{ editando ? 'Modifique los datos de la sede' : 'Alta de una nueva sede en la red' }}
    </p>
  </div>
</div>

<div *ngIf="error" class="alert alert--error">{{ error }}</div>

<div class="card form-card">
  <form [formGroup]="form" (ngSubmit)="guardar()">
    <div class="form-group">
      <label for="nombre">Nombre *</label>
      <input id="nombre" type="text" formControlName="nombre" [class.invalid]="campoInvalido('nombre')" />
      <span *ngIf="campoInvalido('nombre')" class="error">El nombre es obligatorio (máx. 120 caracteres).</span>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="responsable">Responsable *</label>
        <input id="responsable" type="text" formControlName="responsable" [class.invalid]="campoInvalido('responsable')" />
        <span *ngIf="campoInvalido('responsable')" class="error">El responsable es obligatorio.</span>
      </div>
      <div class="form-group">
        <label for="capacidad">Capacidad *</label>
        <input id="capacidad" type="number" min="1" formControlName="capacidad" [class.invalid]="campoInvalido('capacidad')" />
        <span *ngIf="campoInvalido('capacidad')" class="error">Ingrese una capacidad mayor a 0.</span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input id="telefono" type="text" formControlName="telefono" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" [class.invalid]="campoInvalido('email')" />
        <span *ngIf="campoInvalido('email')" class="error">Email inválido.</span>
      </div>
    </div>

    <app-direccion-fields [group]="direccionGroup"></app-direccion-fields>

    <div class="form-actions">
      <button type="button" class="btn btn--secondary" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn btn--primary" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : (editando ? 'Actualizar' : 'Crear refugio') }}
      </button>
    </div>
  </form>
</div>

<fieldset class="direccion-fieldset" [formGroup]="group">
  <legend>Dirección *</legend>
  <div class="form-row">
    <div class="form-group form-group--wide">
      <label for="calle">Calle *</label>
      <input id="calle" type="text" formControlName="calle" [class.invalid]="campoInvalido('calle')" />
      <span *ngIf="campoInvalido('calle')" class="error">La calle es obligatoria.</span>
    </div>
    <div class="form-group">
      <label for="numero">Altura *</label>
      <input id="numero" type="text" formControlName="numero" [class.invalid]="campoInvalido('numero')" />
      <span *ngIf="campoInvalido('numero')" class="error">La altura es obligatoria.</span>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="localidad">Localidad *</label>
      <input id="localidad" type="text" formControlName="localidad" [class.invalid]="campoInvalido('localidad')" />
      <span *ngIf="campoInvalido('localidad')" class="error">La localidad es obligatoria.</span>
    </div>
    <div class="form-group">
      <label for="partido">Partido</label>
      <input id="partido" type="text" formControlName="partido" />
    </div>
    <div class="form-group">
      <label for="provincia">Provincia</label>
      <input id="provincia" type="text" formControlName="provincia" readonly />
    </div>
    <div class="form-group">
      <label for="cp">C.P. *</label>
      <input id="cp" type="text" formControlName="cp" [class.invalid]="campoInvalido('cp')" />
      <span *ngIf="campoInvalido('cp')" class="error">El código postal es obligatorio.</span>
    </div>
  </div>
</fieldset>

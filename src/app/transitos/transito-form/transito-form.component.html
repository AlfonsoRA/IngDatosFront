<div class="page-header">
  <div>
    <h2>{{ editando ? 'Editar tránsito' : 'Nuevo tránsito' }}</h2>
    <p class="page-header__sub">
      {{ editando ? 'Modifique los datos del tránsito' : 'Registrar un nuevo tránsito temporal' }}
    </p>
  </div>
</div>

<div *ngIf="error" class="alert alert--error">{{ error }}</div>

<div class="card form-card">
  <form [formGroup]="form" (ngSubmit)="guardar()">
    <div class="form-row">
      <div class="form-group">
        <label for="animalId">Animal *</label>
        <select id="animalId" formControlName="animalId" [class.invalid]="campoInvalido('animalId')">
          <option [ngValue]="null">Seleccione...</option>
          <option *ngFor="let a of animales" [ngValue]="a.id">{{ a.nombre }} ({{ a.especie }})</option>
        </select>
        <span *ngIf="campoInvalido('animalId')" class="error">Seleccione un animal.</span>
      </div>
      <div class="form-group">
        <label for="hogarTransitoId">Hogar de tránsito *</label>
        <select id="hogarTransitoId" formControlName="hogarTransitoId" [class.invalid]="campoInvalido('hogarTransitoId')">
          <option [ngValue]="null">Seleccione...</option>
          <option *ngFor="let h of hogares" [ngValue]="h.id">{{ nombreHogar(h) }}</option>
        </select>
        <span *ngIf="campoInvalido('hogarTransitoId')" class="error">Seleccione un hogar.</span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="refugioId">Refugio *</label>
        <select id="refugioId" formControlName="refugioId" [class.invalid]="campoInvalido('refugioId')">
          <option [ngValue]="null">Seleccione...</option>
          <option *ngFor="let r of refugios" [ngValue]="r.id">{{ r.nombre }}</option>
        </select>
        <span *ngIf="campoInvalido('refugioId')" class="error">Seleccione un refugio.</span>
      </div>
      <div class="form-group">
        <label for="estadoActual">Estado *</label>
        <select id="estadoActual" formControlName="estadoActual" [class.invalid]="campoInvalido('estadoActual')">
          <option *ngFor="let e of estados" [value]="e">{{ estadoLabels[e] }}</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="fechaInicio">Fecha inicio *</label>
        <input id="fechaInicio" type="date" formControlName="fechaInicio" [class.invalid]="campoInvalido('fechaInicio')" />
        <span *ngIf="campoInvalido('fechaInicio')" class="error">La fecha de inicio es obligatoria.</span>
      </div>
      <div class="form-group">
        <label for="fechaFinEstimada">Fecha fin estimada</label>
        <input id="fechaFinEstimada" type="date" formControlName="fechaFinEstimada" />
      </div>
      <div class="form-group">
        <label for="fechaFinReal">Fecha fin real</label>
        <input id="fechaFinReal" type="date" formControlName="fechaFinReal" />
      </div>
    </div>

    <div class="form-group">
      <label for="observaciones">Observaciones</label>
      <textarea id="observaciones" rows="3" formControlName="observaciones"></textarea>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn--secondary" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn btn--primary" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : (editando ? 'Actualizar' : 'Crear tránsito') }}
      </button>
    </div>
  </form>
</div>
